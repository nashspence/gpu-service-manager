services:
  gpu-service-manager:
    build: .
    container_name: gpu-service-manager
    environment:
      GPU_RUNTIME_DIR: /runtime
      GPU_SERVICE_CONFIG_YAML: |
        services:
          - name: dummy-ok
            path: /workspace/tests/fixtures/services/dummy-ok/docker-compose.yml
          - /workspace/tests/fixtures/services/dummy-alt/compose.yaml
    image: gpu-service-manager:latest
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./:/workspace:ro
      - ./tests/fixtures/runtime:/runtime
      - /var/run/docker.sock:/var/run/docker.sock
